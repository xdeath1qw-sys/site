<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111224;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M100 10 L180 45 L180 110 Q180 160 100 190 Q20 160 20 110 L20 45 Z"
        fill="url(#shieldGrad)"
        stroke="url(#primaryGrad)"
        stroke-width="2.5"/>

  <!-- Shield inner glow border -->
  <path d="M100 20 L170 52 L170 112 Q170 155 100 182 Q30 155 30 112 L30 52 Z"
        fill="none"
        stroke="url(#primaryGrad)"
        stroke-width="1"
        opacity="0.4"/>

  <!-- EFL text -->
  <text x="100" y="125"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="52"
        font-weight="900"
        text-anchor="middle"
        fill="url(#primaryGrad)"
        filter="url(#glow)"
        letter-spacing="2">EFL</text>

  <!-- Decorative line under text -->
  <line x1="55" y1="138" x2="145" y2="138"
        stroke="url(#primaryGrad)"
        stroke-width="2"
        opacity="0.7"/>

  <!-- Top accent dots -->
  <circle cx="65" cy="62" r="4" fill="#6C63FF" opacity="0.8"/>
  <circle cx="100" cy="52" r="5" fill="url(#primaryGrad)" filter="url(#glow)"/>
  <circle cx="135" cy="62" r="4" fill="#00D4FF" opacity="0.8"/>

  <!-- Corner accents -->
  <path d="M48 80 L55 75 L55 85 Z" fill="#6C63FF" opacity="0.5"/>
  <path d="M152 80 L145 75 L145 85 Z" fill="#00D4FF" opacity="0.5"/>
</svg>
