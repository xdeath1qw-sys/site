<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Вход — EFL League</title>
  <link rel="icon" type="image/svg+xml" href="efl-logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .reset-input {
      width: 100%;
      padding: 11px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .reset-input:focus { border-color: var(--primary, #667eea); }
    .reset-label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .reset-error {
      display: none;
      padding: 10px 13px;
      border-radius: 8px;
      font-size: 0.85rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      margin-bottom: 14px;
      align-items: center;
      gap: 8px;
    }
    .new-pass-box {
      background: var(--input-bg);
      border: 2px solid var(--primary, #667eea);
      border-radius: 10px;
      padding: 16px;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-align: center;
      color: var(--text);
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img class="logo-img" src="efl-logo.svg" alt="EFL"> EFL League
      </a>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-bolt"></i>
        <span>EFL League</span>
      </div>
      <h2>Добро пожаловать</h2>
      <p class="auth-subtitle">Войдите в свой аккаунт</p>

      <div class="alert" id="loginAlert" style="display:none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Логин или Email</label>
          <input type="text" id="loginUsername" placeholder="Введите логин" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Пароль</label>
          <div class="input-with-icon">
            <input type="password" id="loginPassword" placeholder="Введите пароль" required>
            <button type="button" class="toggle-pass" id="togglePass">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Войти
        </button>
      </form>

      <div class="auth-footer">
        <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
        <p style="margin-top:8px">
          <a href="#" id="forgotLink" style="color:var(--text-muted);font-size:0.85rem">
            <i class="fas fa-key"></i> Забыли пароль?
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- ======================================
       МОДАЛКА СБРОСА ПАРОЛЯ
  ====================================== -->
  <div id="resetModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:var(--card);border-radius:16px;padding:28px 28px 24px;max-width:400px;width:92%;border:1px solid var(--border);box-shadow:0 10px 50px rgba(0,0,0,0.5);">

      <h3 style="margin:0 0 4px"><i class="fas fa-key"></i> Сброс пароля</h3>

      <!-- ШАГ 1: Email -->
      <div id="rs1">
        <p style="color:var(--text-muted);font-size:0.86rem;margin:4px 0 18px;line-height:1.5">
          Введите почту привязанную к аккаунту.
        </p>
        <div id="rs1err" class="reset-error"></div>
        <div style="margin-bottom:16px">
          <label class="reset-label"><i class="fas fa-envelope"></i> Email аккаунта</label>
          <input type="email" id="rs1email" class="reset-input" placeholder="example@mail.com">
        </div>
        <div style="display:flex;gap:10px">
          <button id="rs1next" class="btn btn-primary" style="flex:1">
            Далее <i class="fas fa-arrow-right"></i>
          </button>
          <button id="rs1cancel" class="btn btn-outline" style="flex:1">Отмена</button>
        </div>
      </div>

      <!-- ШАГ 2: Ник -->
      <div id="rs2" style="display:none">
        <p style="color:var(--text-muted);font-size:0.86rem;margin:4px 0 18px;line-height:1.5">
          Теперь введите ваш никнейм (логин).
        </p>
        <div id="rs2err" class="reset-error"></div>
        <div style="margin-bottom:16px">
          <label class="reset-label"><i class="fas fa-user"></i> Ваш никнейм</label>
          <input type="text" id="rs2nick" class="reset-input" placeholder="Ваш логин">
        </div>
        <div style="display:flex;gap:10px">
          <button id="rs2confirm" class="btn btn-primary" style="flex:1">
            <i class="fas fa-check"></i> Подтвердить
          </button>
          <button id="rs2back" class="btn btn-outline" style="flex:1">
            <i class="fas fa-arrow-left"></i> Назад
          </button>
        </div>
      </div>

      <!-- ШАГ 3: Новый пароль -->
      <div id="rs3" style="display:none;text-align:center">
        <div style="font-size:3rem;margin-bottom:12px">?</div>
        <h4 style="margin:0 0 6px;color:#22c55e">Пароль сброшен!</h4>
        <p style="color:var(--text-muted);font-size:0.86rem;margin:0 0 14px">Ваш новый пароль:</p>
        <div class="new-pass-box" id="rs3pass"></div>
        <p style="color:var(--text-muted);font-size:0.76rem;margin:0 0 18px">
          Сохраните его и смените в настройках профиля.
        </p>
        <button id="rs3login" class="btn btn-primary" style="width:100%">
          <i class="fas fa-sign-in-alt"></i> Войти сейчас
        </button>
      </div>

    </div>
  </div>

  <script src="js/storage.js?v=6"></script>
  <script src="js/discord.js"></script>
  <script>
    var Auth = {
      current: function() {
        try { var d = localStorage.getItem('pl_current'); return d ? JSON.parse(d) : null; } catch(e) { return null; }
      },
      login: function(u) {
        localStorage.setItem('pl_current', JSON.stringify(u));
        localStorage.removeItem('pl_session_backup');
      },
      logout: function() {
        localStorage.removeItem('pl_current');
        localStorage.removeItem('pl_session_backup');
      }
    };
  </script>
  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
  <script>
    // Глазик для пароля
    document.getElementById('togglePass').addEventListener('click', function() {
      const inp = document.getElementById('loginPassword');
      const icon = this.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  </script>

  <script>
    // -- Вход -----------------------------------------------------
    if (Auth && Auth.current()) window.location.href = 'index.html';

    // -- Переменные сброса -----------------------------------------
    var modal       = document.getElementById('resetModal');
    var rs1         = document.getElementById('rs1');
    var rs2         = document.getElementById('rs2');
    var rs3         = document.getElementById('rs3');
    var rs1err      = document.getElementById('rs1err');
    var rs2err      = document.getElementById('rs2err');
    var rs1email    = document.getElementById('rs1email');
    var rs2nick     = document.getElementById('rs2nick');
    var rs3pass     = document.getElementById('rs3pass');

    var foundUser   = null;
    var newPassword = '';

    // -- Открыть / закрыть -----------------------------------------
    document.getElementById('forgotLink').addEventListener('click', function(e) {
      e.preventDefault();
      openModal();
    });

    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    document.getElementById('rs1cancel').addEventListener('click', closeModal);

    function openModal() {
      rs1email.value = '';
      rs2nick.value  = '';
      rs1err.style.display = 'none';
      rs2err.style.display = 'none';
      foundUser = null;
      showStep(1);
      modal.style.display = 'flex';
      setTimeout(function(){ rs1email.focus(); }, 100);
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    function showStep(n) {
      rs1.style.display = n === 1 ? 'block' : 'none';
      rs2.style.display = n === 2 ? 'block' : 'none';
      rs3.style.display = n === 3 ? 'block' : 'none';
    }

    function showErr(el, msg) {
      el.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + msg;
      el.style.display = 'flex';
    }

    // -- Шаг 1: проверяем email ------------------------------------
    function step1() {
      var email = rs1email.value.trim().toLowerCase();
      rs1err.style.display = 'none';

      if (!email) { showErr(rs1err, 'Введите email!'); return; }

      // Ждём загрузки БД если нужно
      if (!window._dbReady) { showErr(rs1err, 'Загрузка данных, попробуйте ещё раз...'); return; }

      var users = DB.get('pl_users');
      var found = users.find(function(u) { return (u.email || '').toLowerCase() === email; });

      if (!found) { showErr(rs1err, 'Аккаунт с такой почтой не найден!'); return; }

      foundUser = found;
      rs2nick.value = '';
      rs2err.style.display = 'none';
      showStep(2);
      setTimeout(function(){ rs2nick.focus(); }, 100);
    }

    document.getElementById('rs1next').addEventListener('click', step1);
    rs1email.addEventListener('keydown', function(e) { if (e.key === 'Enter') step1(); });

    // -- Шаг 2: проверяем ник --------------------------------------
    function step2() {
      var nick = rs2nick.value.trim();
      rs2err.style.display = 'none';

      if (!nick) { showErr(rs2err, 'Введите никнейм!'); return; }
      if (!foundUser) { showStep(1); return; }

      if (foundUser.username.toLowerCase() !== nick.toLowerCase()) {
        showErr(rs2err, 'Никнейм не совпадает с аккаунтом!');
        return;
      }

      // Генерируем пароль
      var chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      newPassword = '';
      for (var i = 0; i < 10; i++) newPassword += chars[Math.floor(Math.random() * chars.length)];

      // Сохраняем в БД
      var users = DB.get('pl_users');
      var idx   = users.findIndex(function(u) { return u.id === foundUser.id; });
      if (idx !== -1) {
        users[idx].password = newPassword;
        DB.set('pl_users', users);
      }

      rs3pass.textContent = newPassword;
      showStep(3);
    }

    document.getElementById('rs2confirm').addEventListener('click', step2);
    rs2nick.addEventListener('keydown', function(e) { if (e.key === 'Enter') step2(); });

    document.getElementById('rs2back').addEventListener('click', function() {
      rs2err.style.display = 'none';
      showStep(1);
      setTimeout(function(){ rs1email.focus(); }, 100);
    });

    // -- Шаг 3: кнопка "Войти сейчас" — закрывает модалку и сразу логинит --
    document.getElementById('rs3login').addEventListener('click', function() {
      if (!foundUser || !newPassword) { closeModal(); return; }

      // Логиним сразу
      var users = DB.get('pl_users');
      var fresh = users.find(function(u) { return u.id === foundUser.id; });
      if (fresh) {
        var safe = {};
        for (var k in fresh) { if (k !== 'password') safe[k] = fresh[k]; }
        Auth.login(safe);
      }

      closeModal();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
