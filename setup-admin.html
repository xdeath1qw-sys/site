<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Setup Admin - EFL League</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { background: #5568d3; }
        .success { color: #28a745; margin-top: 20px; font-weight: bold; }
        .credentials {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>?? Setup Admin</h1>
        <p>Создайте Admin аккаунт для управления сайтом</p>
        <button onclick="createAdmin()">Создать Admin</button>
        <div id="result"></div>
    </div>

    <script>
        function createAdmin() {
            // Очищаем все
            localStorage.clear();
            sessionStorage.clear();
            
            // Создаём Admin
            const admin = {
                id: 1,
                username: 'Admin',
                email: 'admin@efl-league.gg',
                password: 'admin123',
                role: 'admin',
                joinedAt: new Date().toISOString()
            };
            
            const adminPlayer = {
                id: 1,
                nick: 'Admin',
                name: 'Администратор',
                team: '',
                role: 'IGL',
                country: 'RU',
                rating: 1000,
                photo: '',
                userId: 1,
                stats: { kd: 0, hs: 0, wins: 0, matches: 0, adr: 0 }
            };
            
            // Сохраняем
            localStorage.setItem('pl_users', JSON.stringify([admin]));
            localStorage.setItem('pl_players', JSON.stringify([adminPlayer]));
            localStorage.setItem('pl_teams', JSON.stringify([]));
            localStorage.setItem('pl_news', JSON.stringify([]));
            localStorage.setItem('pl_tournaments', JSON.stringify([]));
            localStorage.setItem('pl_matches', JSON.stringify([]));
            localStorage.setItem('pl_vetos', JSON.stringify([]));
            localStorage.setItem('pl_invites', JSON.stringify([]));
            localStorage.setItem('pl_notifications', JSON.stringify([]));
            localStorage.setItem('pl_highlights', JSON.stringify([]));
            localStorage.setItem('pl_awards', JSON.stringify([]));
            localStorage.setItem('pl_tourn_regs', JSON.stringify({}));
            localStorage.setItem('pl_seeded', '1');
            
            document.getElementById('result').innerHTML = `
                <div class="success">? Admin создан!</div>
                <div class="credentials">
                    <strong>Username:</strong> Admin<br>
                    <strong>Password:</strong> admin123<br>
                    <strong>Role:</strong> admin
                </div>
                <button onclick="location.href='login.html'">Войти</button>
            `;
        }
    </script>
</body>
</html>
