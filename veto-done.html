<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вето завершено — EFL League</title>
  <link rel="icon" type="image/svg+xml" href="efl-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="js/storage.js?v=6"></script>
  <script src="js/auth.js?v=6"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
    }

    .vd-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 40px;
      position: relative;
      overflow: hidden;
    }

    .vd-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 50% 0%, rgba(108,99,255,0.15), transparent),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(0,212,255,0.08), transparent),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(239,68,68,0.08), transparent);
      pointer-events: none;
    }

    /* -- Основной лейаут: 3 колонки -- */
    .vd-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      gap: 24px;
      width: 100%;
      max-width: 1100px;
      align-items: start;
    }

    /* -- Колонка игроков -- */
    .vd-team-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vd-team-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .vd-team-name {
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vd-player-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card, #1a1a2e);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      transition: transform 0.15s, border-color 0.15s;
      animation: slideIn 0.4s ease both;
    }

    .vd-team-col.right .vd-player-card {
      flex-direction: row-reverse;
    }

    .vd-player-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary, #667eea);
    }

    .vd-player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-secondary, #111);
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .vd-player-avatar.no-photo {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--text-muted);
      background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
    }

    .vd-player-nick {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .vd-team-col.right .vd-player-nick {
      text-align: right;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .vd-team-col.right .vd-player-card {
      animation-name: slideInRight;
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* -- Центральная колонка -- */
    .vd-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* VS разделитель в шапке */
    .vd-vs-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      margin-bottom: 4px;
    }

    .vd-vs-team {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
    }

    .vd-vs-badge {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text-muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
    }

    /* Карточка с результатом */
    .vd-result-card {
      background: var(--card, #1a1a2e);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .vd-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .vd-title {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--primary, #667eea), var(--accent, #00d4ff));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Блок карты */
    .vd-map-block {
      background: var(--bg-secondary, #111);
      border: 2px solid var(--primary, #667eea);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(102,126,234,0.3); }
      50%       { box-shadow: 0 0 20px 6px rgba(102,126,234,0.2); }
    }

    .vd-map-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .vd-map-name {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent, #00d4ff);
      letter-spacing: 1px;
    }

    /* Текст-подсказка */
    .vd-hint {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .vd-hint strong {
      color: var(--text);
    }

    /* xplay кнопка */
    .btn-xplay {
      background: linear-gradient(135deg, #5865F2, #7289da);
      color: #fff;
      font-size: 1rem;
      padding: 13px 24px;
      border-radius: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(88,101,242,0.4);
      width: 100%;
      margin-bottom: 10px;
      animation: btnPulse 1.8s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.02); }
    }
    .btn-xplay:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 28px rgba(88,101,242,0.6);
      color: #fff;
      animation: none;
    }

    .vd-nav-btns {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .vd-nav-btns .btn {
      flex: 1;
      font-size: 0.82rem;
      padding: 9px 8px;
    }

    .vd-countdown {
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-dim, #555);
    }
    .vd-countdown span {
      color: var(--primary, #667eea);
      font-weight: 700;
    }

    /* -- Адаптив -- */
    @media (max-width: 800px) {
      .vd-layout {
        grid-template-columns: 1fr;
        max-width: 480px;
      }
      .vd-team-col {
        display: none; /* на мобиле прячем боковые колонки */
      }
      .vd-layout.mobile-show .vd-team-col {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><img class="logo-img" src="efl-logo.svg" alt="EFL"> EFL League</a>
    </div>
  </nav>

  <div class="vd-page">
    <div class="vd-layout" id="vdLayout">

      <!-- Левая колонка: команда 1 -->
      <div class="vd-team-col left" id="team1Col">
        <div class="vd-team-label">Команда</div>
        <div class="vd-team-name" id="team1Name">—</div>
        <div id="team1Players"></div>
      </div>

      <!-- Центр -->
      <div class="vd-center">
        <div class="vd-result-card">
          <span class="vd-icon">??</span>
          <div class="vd-title">Вето завершено!</div>

          <div class="vd-map-block" id="mapBlock" style="display:none">
            <div class="vd-map-label"><i class="fas fa-map-marked-alt"></i> Выбранная карта</div>
            <div class="vd-map-name" id="finalMapName">—</div>
          </div>

          <div class="vd-map-block" id="mapsMultiBlock" style="display:none">
            <div class="vd-map-label"><i class="fas fa-check-circle"></i> Выбранные карты</div>
            <div id="mapsMultiList" style="display:flex;flex-direction:column;gap:6px;margin-top:4px"></div>
          </div>

          <!-- Забаненные карты -->
          <div id="bannedBlock" style="display:none;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.25);border-radius:14px;padding:14px 16px;margin-bottom:16px;text-align:left;">
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(239,68,68,0.7);margin-bottom:8px;">
              <i class="fas fa-ban"></i> Забаненные карты
            </div>
            <div id="bannedList" style="display:flex;flex-direction:column;gap:5px;"></div>
          </div>

          <p class="vd-hint">
            Переходите на <strong>xplay</strong> для игры.<br>
            Удачной игры на прекрасном проекте <strong>EFL</strong>! ??
          </p>

          <a href="https://xplay.gg" target="_blank" rel="noopener" class="btn-xplay">
            <i class="fas fa-gamepad"></i> Перейти на xplay.gg
          </a>

          <div class="vd-nav-btns">
            <a href="tournaments.html" class="btn btn-outline">
              <i class="fas fa-trophy"></i> Турниры
            </a>
            <a href="index.html" class="btn btn-outline">
              <i class="fas fa-home"></i> Главная
            </a>
          </div>

          <div class="vd-countdown">
            Переход на главную через <span id="countdown">20</span> сек
          </div>
        </div>
      </div>

      <!-- Правая колонка: команда 2 -->
      <div class="vd-team-col right" id="team2Col">
        <div class="vd-team-label">Команда</div>
        <div class="vd-team-name" id="team2Name">—</div>
        <div id="team2Players"></div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mapParam  = params.get('map');
    const vetoId    = params.get('vetoId');

    // Ждём загрузки БД
    function tryRender() {
      if (!window._dbReady) { setTimeout(tryRender, 150); return; }
      render();
    }
    tryRender();

    function render() {
      // Пробуем получить вето
      let veto = null;
      if (vetoId) {
        const vetos = DB.get('pl_vetos');
        veto = vetos.find(v => String(v.id) === String(vetoId));
      }

      // -- Блок карты --
      if (veto && veto.pickedMaps && veto.pickedMaps.length > 1) {
        // bo3/bo5 — несколько карт
        const multi = document.getElementById('mapsMultiBlock');
        const list  = document.getElementById('mapsMultiList');
        multi.style.display = 'block';
        list.innerHTML = veto.pickedMaps.map((p, i) => {
          const byName = p.pickedBy === 'decider' ? 'Decider'
            : p.pickedBy === 'team1' ? (veto.team1 || 'Команда 1')
            : (veto.team2 || 'Команда 2');
          return `
            <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px">
              <span style="font-weight:800;color:var(--accent,#00d4ff);font-size:1rem">#${i+1} ${p.map.toUpperCase()}</span>
              <span style="font-size:0.78rem;color:var(--text-muted)">${byName}</span>
            </div>`;
        }).join('');
      } else {
        // bo1 — одна карта
        const name = veto
          ? (veto.pickedMaps?.[0]?.map || decodeURIComponent(mapParam || ''))
          : decodeURIComponent(mapParam || '');
        if (name) {
          document.getElementById('mapBlock').style.display = 'block';
          document.getElementById('finalMapName').textContent = name.toUpperCase();
        }
      }

      // -- Бан-лист --
      if (veto && veto.bannedMaps && veto.bannedMaps.length) {
        const bannedBlock = document.getElementById('bannedBlock');
        const bannedList  = document.getElementById('bannedList');
        bannedBlock.style.display = 'block';
        bannedList.innerHTML = veto.bannedMaps.map(b => {
          const byName = b.bannedBy === 'team1' ? (veto.team1 || 'Команда 1') : (veto.team2 || 'Команда 2');
          const isAuto = b.auto ? ' <span style="font-size:0.68rem;opacity:0.6">(авто)</span>' : '';
          return `
            <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(239,68,68,0.06);border-radius:7px;padding:6px 10px">
              <span style="display:flex;align-items:center;gap:6px;font-weight:700;color:rgba(239,68,68,0.85);font-size:0.88rem">
                <i class="fas fa-ban" style="font-size:0.75rem"></i> ${b.map.toUpperCase()}${isAuto}
              </span>
              <span style="font-size:0.75rem;color:var(--text-muted)">${byName}</span>
            </div>`;
        }).join('');
      }

      // -- Игроки команд --
      if (veto) {
        renderTeamPlayers(veto.team1, 'team1Name', 'team1Players', 'left');
        renderTeamPlayers(veto.team2, 'team2Name', 'team2Players', 'right');
      }
    }

    function renderTeamPlayers(teamName, nameElId, listElId, side) {
      if (!teamName) return;

      document.getElementById(nameElId).textContent = teamName;

      const players = DB.get('pl_players').filter(p => p.team === teamName);
      const listEl  = document.getElementById(listElId);

      if (!players.length) {
        listEl.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);text-align:center;padding:8px">Игроки не найдены</div>`;
        return;
      }

      listEl.innerHTML = players.map((p, i) => {
        const delay = i * 0.07;
        const avatarHtml = p.photo
          ? `<img class="vd-player-avatar" src="${p.photo}" alt="${p.nick}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const fallbackHtml = `<div class="vd-player-avatar no-photo" ${p.photo ? 'style="display:none"' : ''}><i class="fas fa-user"></i></div>`;

        return `
          <div class="vd-player-card" style="animation-delay:${delay}s">
            ${avatarHtml}${fallbackHtml}
            <div class="vd-player-nick">${p.nick}</div>
          </div>`;
      }).join('');
    }

    // -- Таймер обратного отсчёта --
    let sec = 20;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
      sec--;
      if (el) el.textContent = sec;
      if (sec <= 0) {
        clearInterval(interval);
        window.location.href = 'index.html';
      }
    }, 1000);

    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => clearInterval(interval));
    });

    // Звук победы
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    } catch(e) {}
  </script>
</body>
</html>
